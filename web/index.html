<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieMe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-left">
          <h1 class="logo">MovieMe</h1>
          <p class="tagline">Find something worth watching.</p>
        </div>
      </div>
    </header>

    <main>
      <section class="genre-section">
        <nav class="genre-nav" id="genre-list" aria-label="Film genres">
          <!-- genre buttons rendered by JS -->
        </nav>
      </section>

      <section class="movies-section">
        <div class="movies-meta" id="movies-meta"></div>

        <div class="movie-grid" id="movie-grid">
          <div class="empty-state" id="empty-state">
            <p>Select a genre to start exploring.</p>
          </div>
        </div>

        <div class="error-state hidden" id="error-state">
          <p id="error-message"></p>
        </div>
      </section>
    </main>

    <footer>
      <span>Powered by TMDB &amp; OpenAI</span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
